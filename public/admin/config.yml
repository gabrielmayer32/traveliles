backend:
  name: github
  repo: gabrielmayer32/traveliles
  branch: multilang
  base_url: https://sveltia-cms-auth.gabriel0mayer.workers.dev

media_folder: public/images/uploads
public_folder: /images/uploads

i18n:
  structure: multiple_folders
  locales:
    - fr
    - en
  default_locale: fr

collections:
  - name: articles
    label: Articles
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    i18n: true
    sortable_fields:
      - title
      - date
      - category
      - author
    view_groups:
      - label: Catégorie
        field: category
      - label: Auteur
        field: author
      - label: Publié
        field: published
    fields:
      - { name: title, label: Titre / Title, widget: string, i18n: true }
      - { name: date, label: Date, widget: datetime, i18n: duplicate }
      - label: Catégorie
        name: category
        widget: select
        i18n: duplicate
        options:
          - Un visage, une histoire
          - Les gardiens du Savoir Faire
          - 24heures avec....
          - Maurice demain
          - Mémoires de l'Île
          - Saveurs
          - Nos régions
          - Art & culture
          - Activités & événements
          - Nos Ambassadeurs régionaux
          - Nos adresses
      - { name: cover, label: Image principale, widget: image, required: false, i18n: duplicate }
      - { name: excerpt, label: Extrait / Excerpt, widget: text, i18n: true }
      - { name: author, label: Auteur, widget: string, default: "Travel-Îles", i18n: duplicate }
      - { name: tags, label: Tags, widget: list, required: false, i18n: true }
      - { name: published, label: Publié, widget: boolean, default: true, i18n: duplicate }
      - { name: body, label: Corps / Body, widget: markdown, i18n: true }

  - name: videos
    label: Vidéos
    folder: src/content/videos
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    i18n: true
    sortable_fields:
      - title
      - date
      - category
    view_groups:
      - label: Catégorie
        field: category
      - label: Source
        field: videoSource
      - label: Publié
        field: published
    fields:
      - { name: title, label: Titre / Title, widget: string, i18n: true }
      - { name: date, label: Date, widget: datetime, i18n: duplicate }
      - label: Catégorie
        name: category
        widget: select
        i18n: duplicate
        options:
          - Un visage, une histoire
          - Les gardiens du Savoir Faire
          - 24heures avec....
          - Maurice demain
          - Mémoires de l'Île
          - Saveurs
          - Nos régions
          - Art & culture
          - Activités & événements
          - Nos Ambassadeurs régionaux
          - Nos adresses
      - label: Source vidéo
        name: videoSource
        widget: select
        i18n: duplicate
        options:
          - { label: YouTube, value: youtube }
          - { label: Vimeo, value: vimeo }
          - { label: Facebook, value: facebook }
          - { label: Instagram, value: instagram }
      - { name: videoId, label: ID vidéo, widget: string, i18n: duplicate, hint: "YouTube: ID de la vidéo. Vimeo: ID numérique. Facebook: URL complète de la vidéo. Instagram: shortcode du reel ou post." }
      - { name: thumbnail, label: Vignette, widget: image, required: false, i18n: duplicate }
      - { name: excerpt, label: Extrait / Excerpt, widget: text, i18n: true }
      - { name: published, label: Publié, widget: boolean, default: true, i18n: duplicate }
      - { name: body, label: Description, widget: markdown, required: false, i18n: true }

  - name: pages
    label: Pages
    folder: src/content/pages
    create: false
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    i18n: true
    fields:
      - { name: title, label: Titre / Title, widget: string, i18n: true }
      - { name: email, label: Email, widget: string, required: false, i18n: duplicate }
      - { name: body, label: Contenu / Content, widget: markdown, required: false, i18n: true }
