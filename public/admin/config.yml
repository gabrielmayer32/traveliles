backend:
  name: github
  repo: gabrielmayer32/traveliles
  branch: dev
  base_url: https://sveltia-cms-auth.gabriel0mayer.workers.dev

site_url: https://multilang.travel-iles.pages.dev
display_url: https://multilang.travel-iles.pages.dev

autosave: true

media_folder: public/images/uploads
public_folder: /images/uploads

i18n:
  structure: multiple_folders
  locales:
    - fr
    - en
  default_locale: fr
  save_all_locales: false

collections:
  - name: hero
    label: Vidéo à la une
    files:
      - name: hero
        label: Vidéo à la une
        file: src/content/hero/hero.md
        fields:
          - { name: title, label: Titre, widget: string }
          - { name: label, label: Étiquette, widget: string, required: false, hint: "Texte libre affiché au-dessus du titre (ex: Nos adresses, Nouveau, Exclusif…)" }
          - { name: excerpt, label: Extrait, widget: text, required: false }
          - { name: videoFile, label: URL vidéo R2, widget: string, hint: "URL publique du fichier MP4 sur Cloudflare R2" }
          - { name: poster, label: Image de démarrage, widget: image, required: false, hint: "Image affichée avant que la vidéo ne démarre (évite l'écran gris)" }
          - { name: published, label: Publié, widget: boolean, default: true }

  - name: articles
    label: Articles
    folder: src/content/articles
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    i18n: true
    preview_path: "articles/{{slug}}"
    sortable_fields:
      - title
      - date
      - category
      - author
    view_groups:
      - label: Catégorie
        field: category
      - label: Auteur
        field: author
      - label: Publié
        field: published
    fields:
      - { name: title, label: Titre / Title, widget: string, required: false, i18n: true }
      - { name: date, label: Date, widget: datetime, i18n: duplicate }
      - label: Catégorie
        name: category
        widget: select
        i18n: duplicate
        options:
          - Rencontres
          - Maurice demain
          - Nos régions
          - Nos Ambassadeurs
          - Savoir-faire
          - Mémoires d'îles
          - Saveurs
          - Activités & Evénements
          - Nos adresses
      - { name: cover, label: Image principale, widget: image, required: false, i18n: duplicate }
      - { name: excerpt, label: Extrait / Excerpt, widget: text, required: false, i18n: true }
      - { name: author, label: Auteur, widget: string, default: "Travel-Îles", i18n: duplicate }
      - { name: tags, label: Tags, widget: list, required: false, i18n: true }
      - { name: published, label: Publié, widget: boolean, default: false, i18n: true }
      - { name: body, label: Corps / Body, widget: markdown, required: false, i18n: true }

  - name: videos
    label: Vidéos
    folder: src/content/videos/fr
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    preview_path: "videos/{{slug}}"
    sortable_fields:
      - title
      - date
      - category
    view_groups:
      - label: Catégorie
        field: category
      - label: Source
        field: videoSource
      - label: Publié
        field: published
    fields:
      - { name: title, label: Titre, widget: string }
      - { name: date, label: Date, widget: datetime }
      - label: Catégorie
        name: category
        widget: select
        options:
          - Rencontres
          - Maurice demain
          - Nos régions
          - Nos Ambassadeurs
          - Savoir-faire
          - Mémoires d'îles
          - Saveurs
          - Activités & Evénements
          - Nos adresses
      - label: Source vidéo
        name: videoSource
        widget: select
        options:
          - { label: YouTube, value: youtube }
          - { label: Vimeo, value: vimeo }
          - { label: Facebook, value: facebook }
          - { label: Instagram, value: instagram }
          - { label: Cloudflare R2, value: r2 }
      - { name: videoId, label: ID vidéo, widget: string, required: false, hint: "YouTube: ID de la vidéo. Vimeo: ID numérique. Facebook: URL complète de la vidéo. Instagram: shortcode du reel ou post. Laisser vide pour R2." }
      - { name: videoFile, label: URL vidéo R2, widget: string, required: false, hint: "URL publique du fichier vidéo sur Cloudflare R2. Utiliser uniquement si Source = Cloudflare R2." }
      - { name: thumbnail, label: Vignette, widget: image, required: false }
      - { name: excerpt, label: Extrait, widget: text, required: false }
      - { name: published, label: Publié, widget: boolean, default: false }
      - { name: body, label: Description, widget: markdown, required: false }

  - name: partners
    label: Partenaires
    files:
      - name: partners
        label: Partenaires
        file: src/content/partners/partners.md
        fields:
          - name: partners
            label: Partenaires
            widget: list
            fields:
              - { name: name, label: Nom, widget: string }
              - { name: logo, label: Logo, widget: image }
              - { name: url, label: Lien, widget: string, required: false }

  - name: pages
    label: Pages
    folder: src/content/pages
    create: false
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    i18n: true
    fields:
      - { name: title, label: Titre / Title, widget: string, required: false, i18n: true }
      - { name: email, label: Email, widget: string, required: false, i18n: duplicate }
      - { name: body, label: Contenu / Content, widget: markdown, required: false, i18n: true }
