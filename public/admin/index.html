<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Travel-Îles CMS</title>
	</head>
	<body>
		<script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

		<script>
			const articlePreviewStyles = `
				@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');

				*, *::before, *::after { box-sizing: border-box; }

				:root {
					--navy: #2b3a8f;
					--navy-300: #97a1d2;
					--ink: #1a1a1a;
					--ink-600: #444444;
					--ink-800: #262626;
					--grey-muted: #999999;
					--grey-line: #e5e5e5;
					--grey-050: #f5f5f5;
					--bg: #fafafa;
					--font-display: 'Playfair Display', Georgia, serif;
					--font-body: 'Inter', system-ui, sans-serif;
					--leading-tight: 1.05;
					--leading-relaxed: 1.8;
					--tracking-wider: 0.14em;
					--radius-sm: 3px;
					--radius-pill: 999px;
				}

				html, body {
					margin: 0; padding: 0;
					background: var(--bg);
					color: var(--ink-800);
					font-family: var(--font-body);
					font-size: 1rem;
					line-height: 1.7;
					-webkit-font-smoothing: antialiased;
				}

				h1, h2, h3, h4 {
					margin: 0;
					color: var(--ink);
					font-family: var(--font-display);
					font-weight: 500;
					line-height: var(--leading-tight);
					letter-spacing: -0.02em;
				}

				p { margin: 0; }
				img { display: block; max-width: 100%; height: auto; }
				a { color: inherit; text-decoration: none; }

				.kicker {
					display: inline-block;
					color: var(--navy);
					font-family: var(--font-body);
					font-size: 0.875rem;
					font-weight: 600;
					letter-spacing: var(--tracking-wider);
					text-transform: uppercase;
				}

				.article-header {
					width: min(100% - 2.5rem, 46rem);
					margin: 2.5rem auto 0;
					display: flex;
					flex-direction: column;
					align-items: flex-start;
					gap: 1.25rem;
				}

				.article-header h1 {
					font-size: clamp(2.25rem, 5.5vw, 4rem);
					line-height: 1.05;
					margin: 0;
				}

				.article-lead {
					font-size: 1.25rem;
					line-height: 1.5;
					color: var(--ink-600);
					max-width: 36rem;
					margin: 0;
				}

				.article-meta {
					display: flex;
					gap: 0.75rem;
					align-items: center;
					padding-top: 1rem;
					border-top: 1px solid var(--grey-line);
					width: 100%;
					color: var(--grey-muted);
					font-size: 0.875rem;
				}

				.article-author { color: var(--ink); font-weight: 500; }

				.article-figure {
					margin: 3rem auto 0;
					width: min(100% - 2.5rem, 62rem);
				}

				.article-cover {
					aspect-ratio: 3 / 2;
					overflow: hidden;
					border-radius: var(--radius-sm);
					background: var(--grey-050);
				}

				.article-cover img { width: 100%; height: 100%; object-fit: cover; }

				.article-caption {
					margin-top: 0.75rem;
					font-size: 0.875rem;
					color: var(--grey-muted);
					font-style: italic;
				}

				.article-body {
					width: min(100% - 2.5rem, 40rem);
					margin: 0 auto;
					padding-top: 4rem;
					padding-bottom: 3rem;
				}

				.prose { font-size: 1.0625rem; line-height: var(--leading-relaxed); }
				.prose > * + * { margin-top: 1.35rem; }
				.prose h2, .prose h3 { margin-top: 2.75rem; }
				.prose a { color: var(--navy); border-bottom: 1px solid var(--navy-300); }

				.tags-footer {
					margin-top: 3rem;
					padding-top: 1.5rem;
					border-top: 1px solid var(--grey-line);
				}

				.tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }

				.tag {
					display: inline-block;
					font-size: 0.75rem;
					font-weight: 500;
					color: var(--ink-600);
					background: var(--grey-050);
					border: 1px solid var(--grey-line);
					border-radius: var(--radius-pill);
					padding: 0.35em 0.85em;
				}

				.empty-state { color: var(--grey-muted); font-style: italic; font-size: 0.875rem; }
			`;

			function formatDate(dateStr) {
				if (!dateStr) return '';
				const d = new Date(dateStr);
				if (isNaN(d)) return dateStr;
				return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
			}

			function markdownToHtml(md) {
				if (!md) return '';
				return md
					.replace(/^### (.+)$/gm, '<h3>$1</h3>')
					.replace(/^## (.+)$/gm, '<h2>$1</h2>')
					.replace(/^# (.+)$/gm, '<h1>$1</h1>')
					.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
					.replace(/\*(.+?)\*/g, '<em>$1</em>')
					.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>')
					.split(/\n{2,}/)
					.map(block => block.trim())
					.filter(Boolean)
					.map(block => (block.startsWith('<h') ? block : `<p>${block.replace(/\n/g, '<br>')}</p>`))
					.join('\n');
			}

			function buildArticlePreview(entry) {
				const data = entry.get('data');
				const title    = data.get('title')    || '';
				const excerpt  = data.get('excerpt')  || '';
				const category = data.get('category') || '';
				const author   = data.get('author')   || 'Travel-Îles';
				const date     = data.get('date')     || '';
				const cover    = data.get('cover')    || '';
				const tags     = data.get('tags') ? data.get('tags').toJS() : [];
				const body     = data.get('body')     || '';

				const coverHtml = cover
					? `<figure class="article-figure">
							<div class="article-cover"><img src="${cover}" alt="${title}" /></div>
							<figcaption class="article-caption">${category} · Travel-Îles</figcaption>
						</figure>`
					: '';

				const tagsHtml = tags.length
					? `<div class="tags-footer">
							<span class="kicker">Sujets</span>
							<div class="tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
						</div>`
					: '';

				const bodyHtml = body
					? `<div class="prose">${markdownToHtml(body)}</div>`
					: '<p class="empty-state">Le corps de l\'article apparaîtra ici…</p>';

				const el = document.createElement('article');
				el.innerHTML = `
					<header class="article-header">
						${category ? `<span class="kicker">${category}</span>` : ''}
						<h1>${title || '<span class="empty-state">Titre…</span>'}</h1>
						${excerpt ? `<p class="article-lead">${excerpt}</p>` : ''}
						<div class="article-meta">
							<span class="article-author">${author}</span>
							${date ? `<span aria-hidden="true">·</span><span>${formatDate(date)}</span>` : ''}
						</div>
					</header>
					${coverHtml}
					<div class="article-body">
						${bodyHtml}
						${tagsHtml}
					</div>
				`;
				return el;
			}

			CMS.registerPreviewStyle(articlePreviewStyles, { raw: true });
			CMS.registerPreviewTemplate('articles', ({ entry }) => buildArticlePreview(entry));
		</script>
	</body>
</html>
